<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="section-title text-white">Novo Cadastro de Cliente</h2>
        <div class="card-pecaja">
            <form id="formCadastro" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label text-white fw-bold">Nome Completo</label>
                    <input type="text" id="nome" class="form-control form-control-dark text-white" placeholder="Ex: Ian Almeida" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white fw-bold">E-mail</label>
                    <input type="email" id="email" class="form-control form-control-dark text-white" placeholder="email@exemplo.com" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white fw-bold">CPF (Apenas números)</label>
                    <input type="text" id="cpf" class="form-control form-control-dark text-white" 
                           maxlength="14" placeholder="000.000.000-00" oninput="mascaraCPF(this)" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white fw-bold">Telefone</label>
                    <input type="text" id="telefone" class="form-control form-control-dark text-white" 
                           maxlength="15" placeholder="(81) 90000-0000" oninput="mascaraTelefone(this)" required>
                </div>
                <div class="col-12 mt-4">
                    <button type="button" class="btn btn-verde w-100 fw-bold" onclick="salvarNovoCliente()">
                        <i class="bi bi-check-circle me-2"></i>Finalizar Cadastro
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Funções de Máscara em tempo real
    function mascaraCPF(i) {
        let v = i.value.replace(/\D/g, "");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        i.value = v;
    }

    function mascaraTelefone(i) {
        let v = i.value.replace(/\D/g, "");
        v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
        v = v.replace(/(\d)(\d{4})$/, "$1-$2");
        i.value = v;
    }
</script>
