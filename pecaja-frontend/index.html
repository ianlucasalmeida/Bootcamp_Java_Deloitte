<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peça Já - Gestão Integrada</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar-matriz d-flex align-items-center justify-content-between">
        <div class="logo" style="cursor: pointer;" onclick="navegar('inicio')">
            <i class="bi bi-gear-wide-connected fs-2 text-white"></i>
            <span class="ms-2 fw-bold text-white fs-4">Peça Já</span>
        </div>

        <nav class="d-flex">
            <a class="nav-link-custom active" data-page="inicio" onclick="navegar('inicio')">
                <i class="bi bi-house"></i> Início
            </a>
            <a class="nav-link-custom" data-page="produtos" onclick="navegar('produtos')">
                <i class="bi bi-tools"></i> Catálogo
            </a>
            <a class="nav-link-custom" data-page="usuario" onclick="navegar('usuario')">
                <i class="bi bi-people"></i> Clientes
            </a>
            <a class="nav-link-custom" data-page="venda" onclick="navegar('venda')">
                <i class="bi bi-cart-check"></i> Nova Venda
            </a>
            <a class="nav-link-custom" data-page="historico" onclick="navegar('historico')">
                <i class="bi bi-clock-history"></i> Histórico
            </a>
        </nav>
    </header>

    <main id="view-port" class="container main-container">
        </main>

    <div class="modal fade" id="modalEditarCliente" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background-color: var(--fundo-card); border: 1px solid var(--verde-pecaja);">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-white fw-bold"><i class="bi bi-person-lines-fill me-2" style="color:var(--verde-pecaja)"></i>Editar Cliente</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditarCliente">
                        <input type="hidden" id="edit-cliente-id">
                        <div class="mb-3">
                            <label class="form-label text-white fw-bold">Nome</label>
                            <input type="text" id="edit-cliente-nome" class="form-control form-control-dark text-white fw-bold">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white fw-bold">E-mail</label>
                            <input type="email" id="edit-cliente-email" class="form-control form-control-dark text-white fw-bold">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white fw-bold">Telefone</label>
                            <input type="text" id="edit-cliente-telefone" class="form-control form-control-dark text-white fw-bold" maxlength="15">
                        </div>
                        <input type="hidden" id="edit-cliente-cpf">
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light fw-bold" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-verde fw-bold" onclick="salvarEdicaoCliente()">Salvar Alterações</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditarProduto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background-color: var(--fundo-card); border: 1px solid var(--verde-pecaja);">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-white fw-bold"><i class="bi bi-box-seam me-2" style="color:var(--verde-pecaja)"></i>Editar Produto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditarProduto">
                        <input type="hidden" id="edit-prod-id">
                        <input type="hidden" id="edit-prod-tipo">
                        <div class="mb-3">
                            <label class="form-label text-white fw-bold">Descrição</label>
                            <input type="text" id="edit-prod-nome" class="form-control form-control-dark text-white fw-bold">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white fw-bold">Preço Base (R$)</label>
                            <input type="number" id="edit-prod-preco" class="form-control form-control-dark text-white fw-bold" step="0.01">
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light fw-bold" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-verde fw-bold" onclick="salvarEdicaoProduto()">Atualizar Item</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalExclusao" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background-color: var(--fundo-card); border: 1px solid #dc3545;">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-white fw-bold"><i class="bi bi-exclamation-triangle-fill text-danger me-2"></i>Confirmar Exclusão</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="texto-modal-exclusao" class="text-white fs-5"></p>
                    <p class="small text-light mb-0">Esta ação não poderá ser desfeita e será bloqueada caso o item tenha histórico de vendas.</p>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light fw-bold" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="btn-confirmar-exclusao" class="btn btn-danger fw-bold">Sim, Excluir</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
