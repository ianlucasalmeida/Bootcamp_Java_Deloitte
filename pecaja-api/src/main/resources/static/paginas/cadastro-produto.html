<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="section-title">Cadastrar Item no Catálogo</h2>
        <div class="card-pecaja">
            <form id="formProduto" class="row g-3">
                
                <div class="col-12 mb-2">
                    <label class="form-label text-secondary fw-bold">Tipo de Item</label>
                    <select id="prod-tipo" class="form-select form-control-dark" onchange="alternarCamposProduto()">
                        <option value="peca">Peça Automotiva</option>
                        <option value="servico">Serviço / Mão de Obra</option>
                    </select>
                </div>

                <div class="col-md-12">
                    <label class="form-label text-secondary">Descrição</label>
                    <input type="text" id="prod-nome" class="form-control form-control-dark" maxlength="100" placeholder="Ex: Pastilha de Freio ou Troca de Óleo" required>
                </div>
                
                <div class="col-md-4">
                    <label class="form-label text-secondary">Preço Base (R$)</label>
                    <input type="number" id="prod-preco" class="form-control form-control-dark" min="0.01" step="0.01" placeholder="0.00" required>
                </div>

                <div class="col-md-4 campo-peca">
                    <label class="form-label text-secondary">Marca</label>
                    <input type="text" id="prod-marca" class="form-control form-control-dark" placeholder="Ex: Bosch">
                </div>
                <div class="col-md-4 campo-peca">
                    <label class="form-label text-secondary">Cód. Fabricante</label>
                    <input type="text" id="prod-codigo" class="form-control form-control-dark" placeholder="Ex: BS-1234">
                </div>

                <div class="col-md-4 campo-servico" style="display: none;">
                    <label class="form-label text-secondary">Horas Estimadas</label>
                    <input type="number" id="prod-horas" class="form-control form-control-dark" min="0.5" step="0.5" placeholder="Ex: 2.5">
                </div>

                <div class="col-12 mt-4">
                    <button type="button" class="btn btn-verde w-100" onclick="salvarNovoProduto()">
                        <i class="bi bi-box-seam me-2"></i>Salvar no Catálogo
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
